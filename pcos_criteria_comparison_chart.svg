  <!-- Key diagnostic rules -->
  <text x="50" y="770" font-family="sans-serif" font-size="11" fill="#37474F" font-style="italic">▸ NIH 1990: Requires BOTH oligo-anovulation + hyperandrogenism (clinical or biochemical). PCOM not included.</text>
  <text x="50" y="795" font-family="sans-serif" font-size="11" fill="#37474F" font-style="italic">▸ Rotterdam 2003: Requires ANY 2 of 3 — oligo-anovulation, hyperandrogenism, or polycystic ovaries.</text>
  <text x="50" y="820" font-family="sans-serif" font-size="11" fill="#37474F" font-style="italic">▸ AES 2006: Requires hyperandrogenism + ovarian dysfunction (oligo-anovulation and/or PCOM). Exclusion mandatory.</text>
  
  <text x="50" y="860" font-family="sans-serif" font-size="9" fill="#78909C">Sources: Zawadzki &amp; Dunaif (1992); Rotterdam ESHRE/ASRM (2004); Azziz et al. (2006)</text>
